name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"

jobs:
  # ============================================
  # Code Quality Checks
  # ============================================
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python linters
        run: |
          pip install flake8 black isort

      - name: 🔍 Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 📐 Check formatting with black
        run: |
          black --check --diff .

  # ============================================
  # Python Agent Tests
  # ============================================
  test-python:
    name: 🐍 Test Python Agents
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        agent:
          [
            "01_customer_support_agent_langgraph",
            "02_search_the_internet_and_summarize",
            "03_chatbot-simulation-evaluation",
            "08_AutoGen_Web_Info_Agent",
          ]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          cd ${{ matrix.agent }}
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: 🧪 Run tests
        run: |
          cd ${{ matrix.agent }}
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory found, skipping..."
          fi
        continue-on-error: true

  # ============================================
  # Node.js Agent Tests
  # ============================================
  test-node:
    name: ⚛️ Test Node.js Agents
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        agent:
          [
            "AI-Co-Browser-main",
            "OpenClaw-From-Scratch-main/OpenClaw-From-Scratch-main",
          ]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.agent }}/package.json

      - name: 📦 Install dependencies
        run: |
          cd ${{ matrix.agent }}
          npm ci || npm install

      - name: 🔍 Run TypeScript check
        run: |
          cd ${{ matrix.agent }}
          npm run typecheck || npx tsc --noEmit || echo "No typecheck script"
        continue-on-error: true

      - name: 🧪 Run tests
        run: |
          cd ${{ matrix.agent }}
          npm test || echo "No test script"
        continue-on-error: true

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [test-python, test-node]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔒 Run safety check
        run: |
          pip install safety
          find . -name "requirements.txt" -exec echo "Checking {}" \; -exec safety check -r {} \; || true

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔒 Run npm audit
        run: |
          for dir in AI-Co-Browser-main OpenClaw-From-Scratch-main/OpenClaw-From-Scratch-main; do
            if [ -f "$dir/package.json" ]; then
              echo "Auditing $dir"
              cd $dir && npm audit --audit-level=critical || true
              cd -
            fi
          done

  # ============================================
  # Build Check
  # ============================================
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: [test-python, test-node]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏗️ Build AI-Co-Browser
        run: |
          cd AI-Co-Browser-main
          npm ci || npm install
          npm run build || echo "No build script"
        continue-on-error: true

  # ============================================
  # Documentation Check
  # ============================================
  docs:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check README files exist
        run: |
          for dir in 01_* 02_* 03_* 04\ * 05\ * 06\ * 07\ * 08_* AI-Co-Browser-main OpenClaw-From-Scratch-main; do
            if [ -d "$dir" ]; then
              if [ -f "$dir/README.md" ]; then
                echo "✅ $dir has README.md"
              else
                echo "⚠️ $dir missing README.md"
              fi
            fi
          done

      - name: 📝 Check required docs
        run: |
          required_files=("README.md" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md" "SECURITY.md" "LICENSE")
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file missing" && exit 1
            fi
          done
